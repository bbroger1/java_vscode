<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition>
    <div class="form-group">
        <label for="riscoProcesso">Processo</label>
        <h:selectOneMenu id="riscoProcesso"
                         value="#{avaliacaoMB.riscoSelecionado.processoId}"
                         styleClass="form-control" required="true">
            <f:selectItem itemValue="" itemLabel="Selecione..."/>
            <f:selectItems value="#{avaliacaoMB.processos}" var="p"
                           itemValue="#{p.id}" itemLabel="#{p.nome}"/>
        </h:selectOneMenu>
    </div>
    <div class="form-group">
        <label for="riscoNome">Nome</label>
        <h:inputText id="riscoNome" value="#{avaliacaoMB.riscoSelecionado.nome}"
                     styleClass="form-control" required="true" maxlength="255"/>
    </div>
    <div class="form-group">
        <label for="riscoDescricao">Descrição</label>
        <h:inputTextarea id="riscoDescricao"
                         value="#{avaliacaoMB.riscoSelecionado.descricao}"
                         styleClass="form-control" rows="3"/>
    </div>
    <div class="form-row">
        <div class="form-group col-md-4">
            <label for="riscoProbabilidade">Probabilidade</label>
            <h:selectOneMenu id="riscoProbabilidade"
                             value="#{avaliacaoMB.riscoSelecionado.probabilidade}"
                             styleClass="form-control">
                <f:selectItem itemValue="" itemLabel="Selecione..."/>
                <f:selectItem itemValue="BAIXA" itemLabel="Baixa"/>
                <f:selectItem itemValue="MEDIA" itemLabel="Média"/>
                <f:selectItem itemValue="ALTA" itemLabel="Alta"/>
            </h:selectOneMenu>
        </div>
        <div class="form-group col-md-4">
            <label for="riscoImpacto">Impacto</label>
            <h:selectOneMenu id="riscoImpacto"
                             value="#{avaliacaoMB.riscoSelecionado.impacto}"
                             styleClass="form-control">
                <f:selectItem itemValue="" itemLabel="Selecione..."/>
                <f:selectItem itemValue="BAIXO" itemLabel="Baixo"/>
                <f:selectItem itemValue="MEDIO" itemLabel="Médio"/>
                <f:selectItem itemValue="ALTO" itemLabel="Alto"/>
            </h:selectOneMenu>
        </div>
        <div class="form-group col-md-4">
            <label for="riscoNivel">Nível</label>
            <h:selectOneMenu id="riscoNivel"
                             value="#{avaliacaoMB.riscoSelecionado.nivel}"
                             styleClass="form-control">
                <f:selectItem itemValue="" itemLabel="Selecione..."/>
                <f:selectItem itemValue="BAIXO" itemLabel="Baixo"/>
                <f:selectItem itemValue="MEDIO" itemLabel="Médio"/>
                <f:selectItem itemValue="ALTO" itemLabel="Alto"/>
                <f:selectItem itemValue="CRITICO" itemLabel="Crítico"/>
            </h:selectOneMenu>
        </div>
    </div>
</ui:composition>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition>
    <div class="form-group">
        <label for="controleFator">Fator</label>
        <h:selectOneMenu id="controleFator"
                         value="#{avaliacaoMB.controleSelecionado.fatorId}"
                         styleClass="form-control" required="true">
            <f:selectItem itemValue="" itemLabel="Selecione..."/>
            <f:selectItems value="#{avaliacaoMB.fatores}" var="f"
                           itemValue="#{f.id}" itemLabel="#{f.nome}"/>
        </h:selectOneMenu>
    </div>
    <div class="form-group">
        <label for="controleNome">Nome</label>
        <h:inputText id="controleNome" value="#{avaliacaoMB.controleSelecionado.nome}"
                     styleClass="form-control" required="true" maxlength="255"/>
    </div>
    <div class="form-group">
        <label for="controleTipo">Tipo</label>
        <h:selectOneMenu id="controleTipo"
                         value="#{avaliacaoMB.controleSelecionado.tipo}"
                         styleClass="form-control">
            <f:selectItem itemValue="" itemLabel="Selecione..."/>
            <f:selectItem itemValue="PREVENTIVO" itemLabel="Preventivo"/>
            <f:selectItem itemValue="DETECTIVO" itemLabel="Detectivo"/>
            <f:selectItem itemValue="CORRETIVO" itemLabel="Corretivo"/>
        </h:selectOneMenu>
    </div>
    <div class="form-group">
        <label for="controleModelo">Modelo de Negócio (opcional)</label>
        <h:selectOneMenu id="controleModelo"
                         value="#{avaliacaoMB.controleSelecionado.modeloNegocioId}"
                         styleClass="form-control">
            <f:selectItem itemValue="" itemLabel="Nenhum"/>
            <f:selectItems value="#{avaliacaoMB.modelosNegocio}" var="mn"
                           itemValue="#{mn.id}" itemLabel="#{mn.nome}"/>
        </h:selectOneMenu>
    </div>
    <div class="form-group">
        <label for="controleStatus">Status</label>
        <h:selectOneMenu id="controleStatus"
                         value="#{avaliacaoMB.controleSelecionado.status}"
                         styleClass="form-control">
            <f:selectItem itemValue="ATIVO" itemLabel="Ativo"/>
            <f:selectItem itemValue="INATIVO" itemLabel="Inativo"/>
                <f:selectItem itemValue="EM_IMPLANTACAO" itemLabel="Em Implantação"/>
        </h:selectOneMenu>
    </div>
    <div class="form-group">
        <label for="controleDescricao">Descrição</label>
        <h:inputTextarea id="controleDescricao"
                         value="#{avaliacaoMB.controleSelecionado.descricao}"
                         styleClass="form-control" rows="3"/>
    </div>
</ui:composition>
</html>

<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:form id="#{modalId}Form" prependId="false">
        <div class="modal fade" id="#{modalId}" tabindex="-1" role="dialog">
            <div class="modal-dialog modal-lg" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Selecionar #{entidadeLabel}</h5>
                        <button type="button" class="close" data-dismiss="modal">&#215;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="#{modalId}Filtro">Pesquisar</label>
                            <h:inputText id="#{modalId}Filtro"
                                         value="#{bean.filtroSelecao}"
                                         styleClass="form-control"
                                         placeholder="Digite para pesquisar...">
                                <f:ajax event="keyup" render="#{modalId}Tabela"
                                        listener="#{bean.pesquisarSelecao}" delay="300"/>
                            </h:inputText>
                        </div>
                        <h:panelGroup id="#{modalId}Tabela">
                            <h:dataTable value="#{bean.itensSelecao}" var="item"
                                         styleClass="table table-striped table-hover"
                                         rendered="#{not empty bean.itensSelecao}">
                                <h:column styleClass="text-center" style="width:80px">
                                    <f:facet name="header">Selecionar</f:facet>
                                    <h:commandLink styleClass="btn btn-success btn-sm"
                                                 action="#{bean.selecionarItem(item)}"
                                                 onclick="_modalId='#{modalId}';">
                                        <i class="fas fa-check"></i>
                                        <f:ajax render=":avaliacaoForm:tabContentInner :globalMessages"
                                                onevent="handleFecharModal"/>
                                    </h:commandLink>
                                </h:column>
                                <ui:insert name="colunas"/>
                            </h:dataTable>
                            <div class="text-center py-4 text-muted" rendered="#{empty bean.itensSelecao}">
                                <i class="fas fa-inbox fa-2x d-block mb-2"></i>
                                <span>Nenhum registro encontrado.</span>
                            </div>
                        </h:panelGroup>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </h:form>
</ui:composition>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition>
    <nav aria-label="Navegacao de paginas" rendered="#{bean.totalPaginas > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item #{bean.pagina == 1 ? 'disabled' : ''}">
                <h:commandLink styleClass="page-link" value="&#171;"
                               action="#{bean.retrocederPagina}"
                               rendered="#{bean.pagina > 1}">
                    <f:ajax render="tabelaResultados paginacao"/>
                </h:commandLink>
            </li>
            <ui:repeat value="#{bean.totalPaginas}" var="p">
                <li class="page-item #{bean.pagina == p ? 'active' : ''}">
                    <h:commandLink styleClass="page-link" value="#{p}"
                                   action="#{bean.irParaPagina(p)}">
                        <f:ajax render="tabelaResultados paginacao"/>
                    </h:commandLink>
                </li>
            </ui:repeat>
            <li class="page-item #{bean.pagina == bean.totalPaginas ? 'disabled' : ''}">
                <h:commandLink styleClass="page-link" value="&#187;"
                               action="#{bean.avancarPagina}"
                               rendered="#{bean.pagina lt bean.totalPaginas}">
                    <f:ajax render="tabelaResultados paginacao"/>
                </h:commandLink>
            </li>
        </ul>
    </nav>
</ui:composition>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition>
    <div class="form-group">
        <label for="processoNome">Nome</label>
        <h:inputText id="processoNome" value="#{avaliacaoMB.processoSelecionado.nome}"
                     styleClass="form-control" required="true" maxlength="255"/>
        <h:message for="processoNome" styleClass="text-danger"/>
    </div>
    <div class="form-group">
        <label for="processoCodigo">Código</label>
        <h:inputText id="processoCodigo" value="#{avaliacaoMB.processoSelecionado.codigo}"
                     styleClass="form-control" maxlength="50"/>
    </div>
    <div class="form-group">
        <label for="processoDescricao">Descrição</label>
        <h:inputTextarea id="processoDescricao"
                         value="#{avaliacaoMB.processoSelecionado.descricao}"
                         styleClass="form-control" rows="3"/>
    </div>
</ui:composition>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition>
    <div class="modal fade" id="#{modalId}" tabindex="-1" role="dialog"
         aria-labelledby="#{modalId}Label" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <h:form id="#{modalId}Form">
                    <ui:include src="/WEB-INF/templates/includes/csrf-token.xhtml"/>
                    <div class="modal-header">
                        <h5 class="modal-title" id="#{modalId}Label">#{titulo}</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
                            <span aria-hidden="true">&#215;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <h:messages id="#{modalId}Messages" styleClass="alert alert-dismissible fade show"/>
                        <ui:include src="/WEB-INF/templates/includes/campos-#{campos}.xhtml"/>
                    </div>
                    <div class="modal-footer">
                        <h:commandLink styleClass="btn btn-primary btn-sm"
                                        action="#{acaoSalvar}"
                                        onclick="_modalId='#{modalId}';">
                            <i class="fas fa-save mr-1"></i>Salvar
                            <f:ajax execute="@form" render=":#{modalId}Form :#{modalId}Messages :tabContentInner"
                                    onevent="handleSalvarAjax"/>
                        </h:commandLink>
                        <button type="button" class="btn btn-secondary"
                                data-dismiss="modal">Cancelar</button>
                    </div>
                </h:form>
            </div>
        </div>
    </div>
</ui:composition>
</html>

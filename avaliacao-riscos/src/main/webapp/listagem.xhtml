<ui:composition template="/WEB-INF/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <ui:define name="conteudo">
        <h:messages id="globalMessages" globalOnly="true" styleClass="alert alert-dismissible fade show"/>
        <h:form id="listagemForm">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Avaliações de Riscos e Controles</h4>
                    <h:link outcome="avaliacao" styleClass="btn btn-primary btn-sm">
                        <i class="fas fa-plus mr-1"></i>Nova Avaliação
                    </h:link>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label for="filtro">Pesquisar</label>
                        <h:inputText id="filtro"
                                     value="#{listagemMB.filtro}"
                                     styleClass="form-control"
                                     placeholder="Digite título ou descrição para pesquisar...">
                            <f:ajax event="keyup" render="tabelaAvaliacoes paginacao globalMessages"
                                    listener="#{listagemMB.pesquisar}" delay="300"/>
                        </h:inputText>
                    </div>

                    <h:panelGroup id="tabelaAvaliacoes">
                        <h:dataTable value="#{listagemMB.avaliacoes}"
                                     var="avaliacao"
                                     styleClass="table table-striped table-hover"
                                     rendered="#{not empty listagemMB.avaliacoes}">
                            <h:column>
                                <f:facet name="header">#</f:facet>
                                #{avaliacao.id}
                            </h:column>
                            <h:column>
                                <f:facet name="header">Título</f:facet>
                                <h:commandLink value="#{avaliacao.titulo}"
                                               action="#{listagemMB.navegarParaAvaliacao(avaliacao.id)}"/>
                            </h:column>
                            <h:column>
                                <f:facet name="header">Descrição</f:facet>
                                #{avaliacao.descricao}
                            </h:column>
                            <h:column styleClass="text-center">
                                <f:facet name="header">
                                    <div class="text-center">Status</div>
                                </f:facet>
                                <div class="d-flex justify-content-center">
                                    <span class="badge #{avaliacao.status == 'CONCLUIDA' ? 'badge-success' :
                                                        avaliacao.status == 'ARQUIVADA' ? 'badge-secondary' :
                                                        'badge-primary'}">
                                        #{avaliacao.statusFormatado}
                                    </span>
                                </div>
                            </h:column>

                            <h:column styleClass="text-center">
                                <f:facet name="header">
                                    <div class="text-center">Data Criação</div>
                                </f:facet>
                                <div class="d-flex justify-content-center">
                                    <span>#{avaliacao.dataCriacaoFormatada}</span>
                                </div>
                            </h:column>
                            <h:column styleClass="text-center" style="width:80px">
                            <f:facet name="header">
                                <div class="text-center">Ações</div>
                            </f:facet>
                            <div class="d-flex justify-content-center">
                                <h:commandLink styleClass="action-icon text-info mr-1" title="Visualizar"
                                            action="#{listagemMB.navegarParaAvaliacao(avaliacao.id)}">
                                    <i class="fas fa-eye"/>
                                </h:commandLink>
                                <h:commandLink styleClass="action-icon text-warning mr-1" title="Editar"
                                            action="#{listagemMB.navegarParaAvaliacao(avaliacao.id)}">
                                    <i class="fas fa-pencil-alt"/>
                                </h:commandLink>
                                <h:commandLink styleClass="action-icon text-danger" title="Excluir"
                                              action="#{listagemMB.prepararExcluir(avaliacao.id)}"
                                              onclick="_modalId='modalExcluir'; _isNovo=false;">
                                    <i class="fas fa-trash"/>
                                    <f:ajax render=":listagemForm:modalExcluir" onevent="handleAjaxComplete"/>
                                </h:commandLink>
                            </div>
                        </h:column>
                        </h:dataTable>
                        <h:panelGroup rendered="#{empty listagemMB.avaliacoes}">
                            <div class="text-center py-5 text-muted">
                                <i class="fas fa-inbox fa-3x d-block mb-2"></i>
                                <span>Nenhuma avaliação encontrada.</span>
                            </div>
                        </h:panelGroup>
                    </h:panelGroup>

                    <h:panelGroup id="paginacao" layout="block" styleClass="mt-3">
                        <nav aria-label="Navegação de páginas"
                             rendered="#{listagemMB.totalPaginas > 1}">
                            <ul class="pagination pagination-sm justify-content-center">
                                <li class="page-item #{listagemMB.pagina == 1 ? 'disabled' : ''}">
                                    <h:commandLink styleClass="page-link" value="&#171;"
                                                   action="#{listagemMB.retrocederPagina}"
                                                   rendered="#{listagemMB.pagina > 1}">
                                        <f:ajax render="tabelaAvaliacoes paginacao"/>
                                    </h:commandLink>
                                </li>
                                <ui:repeat value="#{listagemMB.totalPaginas}" var="p">
                                    <li class="page-item #{listagemMB.pagina == p ? 'active' : ''}">
                                        <h:commandLink styleClass="page-link" value="#{p}"
                                                       action="#{listagemMB.irParaPagina(p)}">
                                            <f:ajax render="tabelaAvaliacoes paginacao"/>
                                        </h:commandLink>
                                    </li>
                                </ui:repeat>
                                <li class="page-item #{listagemMB.pagina == listagemMB.totalPaginas ? 'disabled' : ''}">
                                    <h:commandLink styleClass="page-link" value="&#187;"
                                                   action="#{listagemMB.avancarPagina}"
                                                   rendered="#{listagemMB.pagina lt listagemMB.totalPaginas}">
                                        <f:ajax render="tabelaAvaliacoes paginacao"/>
                                    </h:commandLink>
                                </li>
                            </ul>
                        </nav>
                    </h:panelGroup>
                </div>
            </div>
            <h:panelGroup id="modalExcluir">
                <div class="modal fade" id="modalExcluir" tabindex="-1" role="dialog">
                    <div class="modal-dialog" role="document">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Confirmar Exclusão</h5>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
                                    <span aria-hidden="true">&#215;</span>
                                </button>
                            </div>
                            <div class="modal-body text-center">
                                <i class="fas fa-exclamation-triangle text-warning fa-3x mb-3"></i>
                                <p class="mb-0">Confirma a exclusão desta avaliação?</p>
                            </div>
                            <div class="modal-footer">
                                <h:commandLink styleClass="btn btn-danger btn-sm"
                                                action="#{listagemMB.excluir}"
                                                onclick="_modalId='modalExcluir';">
                                    <i class="fas fa-trash mr-1"></i>Excluir
                                    <f:ajax render="tabelaAvaliacoes paginacao globalMessages"
                                            onevent="handleFecharModal"/>
                                </h:commandLink>
                                <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Cancelar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </h:panelGroup>
        </h:form>
    </ui:define>
</ui:composition>
